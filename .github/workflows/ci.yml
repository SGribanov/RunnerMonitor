name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go tests (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify modules are tidy
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Build runner-monitor
        run: go build -o runner-monitor ./cmd/runner-monitor

  powershell-syntax:
    name: PowerShell syntax check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parseErrors = @()
          Get-ChildItem -Path . -Filter *.ps1 -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref] $tokens, [ref] $errors) | Out-Null
            foreach ($errorItem in $errors) {
              $parseErrors += [pscustomobject]@{
                File = $_.FullName
                Message = $errorItem.Message
                Line = $errorItem.Extent.StartLineNumber
                Column = $errorItem.Extent.StartColumnNumber
              }
            }
          }
          if ($parseErrors.Count -gt 0) {
            $parseErrors | Format-List | Out-String | Write-Error
            exit 1
          }
