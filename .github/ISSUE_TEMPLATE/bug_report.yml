name: Bug report
description: Report a RunnerMonitor bug or regression.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please remove secrets, runner tokens, sudo passwords, and private hostnames before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands and relevant runner type, but redact secrets.
      placeholder: |
        1. Run ...
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, WSL Ubuntu, Go version, gh version
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste only redacted output.
