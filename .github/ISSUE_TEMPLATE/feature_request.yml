name: Feature request
description: Suggest an improvement or new RunnerMonitor capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator workflow or safety gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should RunnerMonitor do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI
        - CLI
        - GitHub Actions
        - Windows runner control
        - WSL/Linux runner control
        - Remote runner host
        - OneDev future support
        - Documentation
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Could this start, stop, unregister, delete, or reconfigure runners?
